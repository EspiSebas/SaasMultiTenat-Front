<div class="container-fluid">
  <div class="row">

   
    <div class="col-md-2 bg-dark min-vh-100 p-0 position-fixed">
      <app-navbar></app-navbar>
    </div>

  
    <div class="col-md-10 offset-md-2 p-4 bg-light min-vh-100">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">🚗 Productos</h2>

        <button class="btn btn-success d-flex align-items-center" (click)="openModalCreate()">
          <i class="bi bi-plus-lg me-2"></i>
          Añadir Producto
        </button>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-3">

          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">

              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>Nombre</th>
                  <th>Descripción</th>
                  <th>Cantidad</th>
                  <th>Precio</th>
                  <th>Categoría</th>
                  <th>Estado</th>
                  <th class="text-center">Acciones</th>
                </tr>
              </thead>

              <tbody>
                <tr *ngFor="let i of products">
                  <td class="fw-semibold">{{i.id}}</td>
                  <td>{{i.name}}</td>
                  <td class="text-truncate" style="max-width: 180px;">
                    {{i.description}}
                  </td>
                  <td>{{i.quantity}}</td>
                  <td class="fw-semibold text-success">
                    ${{i.price}}
                  </td>
                  <td>{{i.category.name}}</td>
                  <td>
                    <span [ngClass]="getStatusClass(i.status)">
                      {{ getStatusLabel(i.status) }}
                    </span>
                  </td>
                  <td class="text-center">
                    <button class="btn btn-outline-primary btn-sm me-2">
                      Editar
                    </button>

                    <button class="btn btn-outline-danger btn-sm" (click)="delete(i.id)">
                      Eliminar
                    </button>
                  </td>
                </tr>
              </tbody>

            </table>
          </div>

        </div>
      </div>

    </div>


  </div>
</div>

<app-modal-create-product
*ngIf="showModalCreate"
(close)="closeModalCreate()"
(created)="onProductCreated($event)"
></app-modal-create-product>
