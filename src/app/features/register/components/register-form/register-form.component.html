<div class="container vh-100 d-flex justify-content-center align-items-center">

  <div class="card shadow border-0" style="width:100%; max-width:520px; border-radius:14px;">

    <div class="card-body p-3 p-md-4">

      <!-- Header -->
      <div class="text-center mb-3">
        <h5 class="fw-bold mb-1">Crear cuenta</h5>
        <p class="text-muted small mb-0">Regístrate para comenzar</p>
      </div>

      <form (ngSubmit)="register()">

        <div class="row g-2">
          <div class="col-md-6">
            <div class="form-floating form-floating-sm">
              <input 
                type="text"
                class="form-control form-control-sm"
                id="name"
                placeholder="Nombre"
                [(ngModel)]="name"
                name="name"
                required>
              <label for="name">Nombre</label>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-floating form-floating-sm">
              <input 
                type="text"
                class="form-control form-control-sm"
                id="company"
                placeholder="Compañía"
                [(ngModel)]="nameCompany"
                name="nameCompany"
                required>
              <label for="company">Compañía</label>
            </div>
          </div>

          <div class="col-12">
            <div class="form-floating form-floating-sm">
              <input 
                type="email"
                class="form-control form-control-sm"
                id="email"
                placeholder="Correo"
                [(ngModel)]="email"
                name="email"
                required>
              <label for="email">Correo</label>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-floating form-floating-sm">
              <input 
                type="password"
                class="form-control form-control-sm"
                id="password"
                placeholder="Contraseña"
                [(ngModel)]="password"
                name="password"
                required>
              <label for="password">Contraseña</label>
            </div>
          </div>

        </div>
        <button 
          type="submit"
          class="btn btn-success w-100 mt-3 py-1 fw-semibold">
          Crear cuenta
        </button>
        <div 
          *ngIf="errorMessage"
          class="alert alert-danger text-center mt-2 py-1 small">
          {{errorMessage}}
        </div>

      </form>

      <div class="d-flex align-items-center my-3">
        <hr class="flex-grow-1">
        <span class="px-2 text-muted small">o</span>
        <hr class="flex-grow-1">
      </div>

      
      <div class="text-center">
        <p class="mb-1 small">¿Ya tienes cuenta?</p>
        <button 
          class="btn btn-outline-primary w-100 py-1"
          routerLink="/login">
          Iniciar sesión
        </button>
      </div>

    </div>
  </div>

</div>
