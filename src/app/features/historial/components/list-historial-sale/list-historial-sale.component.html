
<div class="container-fluid">
  <div class="row">
   
    <div class="col-md-2 bg-dark text-white vh-100 p-3">
      <app-navbar></app-navbar>
    </div>
  
    <div class="col-md-10 bg-light min-vh-100 p-4">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Historial Ventas</h2>

      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-3">

          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">

              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>Metodo de Pago</th>
                  <th>Descuento</th>
                
                  <th class="text-center">Accion</th>
                </tr>
              </thead>

              <tbody>

                <tr *ngFor="let i of sales">
                  <td class="fw-semibold">{{i.id}}</td>
                  <td class="text-truncate" style="max-width: 180px;">
                    {{i.paymentMethod}}
                  </td>
                  <td class="fw-semibold text-success">
                    ${{i.discount}}
                  </td>
                  <td class="text-center">
                    <button class="btn btn-outline-danger btn-sm" (click)="openModalDetails(i)">
                      Ver detalles
                    </button>
                  </td>
                </tr>
              </tbody>

            </table>
          </div>

        </div>
      </div>

    </div>


  </div>
</div>

<app-modal-details
  *ngIf="showDetails"
  [sale]="selectedSale"
  (close)="closeModalDetails()"
  >
</app-modal-details>
