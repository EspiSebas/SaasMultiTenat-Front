<div class="modal-backdrop fade show"></div>

<div class="modal fade show d-block">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">


            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">Crear categoría</h5>
                <button type="button" class="btn-close btn-close-white" (click)="cancel()">
                </button>
            </div>

            <div class="modal-body">

                <form>


                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" [(ngModel)]="name" name="name"
                            placeholder="Escribe el nombre" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <input type="text" class="form-control" [(ngModel)]="description" name="description"
                            placeholder="Escribe la descripción" required>
                    </div>

                </form>

            </div>


            <div class="modal-footer">
                <button class="btn btn-secondary" (click)="cancel()">
                    Cancelar
                </button>
                <button class="btn btn-primary" (click)="save()" [disabled]="!name || !description">
                    Guardar
                </button>
            </div>

        </div>
    </div>
</div>
