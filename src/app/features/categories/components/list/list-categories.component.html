<div class="container-fluid">
  <div class="row">

 
    <div class="col-md-2 bg-dark text-white vh-100 p-3">
      <app-navbar></app-navbar>
    </div>

   
    <div class="col-md-10 bg-light min-vh-100 p-4">

      
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Categorias</h2>

        <button class="btn btn-success d-flex align-items-center">
          <i class="bi bi-plus-lg me-2"></i>
          Añadir Categoria
        </button>
      </div>

    
      <div class="row g-4">

        <div class="col-md-4" *ngFor="let cat of categories">
          <div class="card shadow-sm border-0 h-100">

            <div class="card-body d-flex flex-column">

              <h6 class="text-muted">ID: {{cat.id}}</h6>

              <h5 class="fw-bold">{{cat.name}}</h5>

              
              <p class="text-muted flex-grow-1">
                {{cat.description}}
              </p>

              
              <div class="d-flex justify-content-end mt-3">
                <button class="btn btn-outline-primary btn-sm me-2">
                  Editar
                </button>

                <button class="btn btn-outline-danger btn-sm">
                  Eliminar
                </button>
              </div>

            </div>

          </div>
        </div>

      </div>

    </div>
  </div>
</div>
