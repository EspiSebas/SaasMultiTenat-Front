<div class="container-fluid">
    <div class="row">

        <div class="col-md-2 bg-dark min-vh-100 p-0 position-fixed">
            <app-navbar></app-navbar>
        </div>

        <div class="col-md-10 offset-md-2 p-4 bg-light min-vh-100">
            <div class="row g-4">

                
                <div class="col-md-8">
                    <div class="card shadow-sm rounded-4">
                        <div class="card-body">
                            <div class="mb-3">
                                <input type="text" class="form-control form-control-lg"
                                    placeholder="🔍 Buscar producto..." />
                            </div>
                            <div class="row g-3">
                                <div class="col-md-4" *ngFor="let product of products">
                                    <div class="card h-100 shadow-sm border-0 rounded-4">
                                        <div class="card-body d-flex flex-column">

                                            <h6 class="fw-bold">{{ product.name }}</h6>
                                            <small class="text-muted mb-2">Stock: {{ product.quantity }}</small>

                                            <div class="mt-auto">
                                                <p class="fw-bold text-success mb-2">
                                                    {{ product.price | currency }}
                                                </p>

                                                <button class="btn btn-primary w-100 btn-sm"
                                                    [disabled]="product.stock === 0" (click)="addToCart(product)">
                                                    ➕ Agregar
                                                </button>
                                            </div>

                                        </div>
                                    </div>
                                </div>

                            </div>

                        </div>
                    </div>
                </div>


                
                <div class="col-md-4">
                    <div class="card shadow-lg rounded-4 border-0">
                        <div class="card-body">

                            <h5 class="fw-bold mb-3">🧾 Resumen</h5>

                         <div class="table-responsive mb-3">
                                <table class="table align-middle">
                                    <thead>
                                        <tr>
                                            <th>Producto</th>
                                            <th>Cant</th>
                                            <th>Total</th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr *ngFor="let item of cart">
                                            <td>{{ item.name }}</td>

                                            <td>
                                                <input type="number" class="form-control form-control-sm"
                                                    [(ngModel)]="item.quantity" (change)="updateQuantity(item)"
                                                    min="1" />
                                            </td>

                                            <td>{{ item.total | currency }}</td>

                                            <td>
                                                <button class="btn btn-sm btn-danger" (click)="removeFromCart(item)">
                                                    ✖
                                                </button>
                                            </td>
                                        </tr>
                                    </tbody>

                                </table>
                            </div>


                        
                            <div class="mb-3">
                                <label class="form-label">Método de pago</label>
                                <select class="form-select" [(ngModel)]="paymentMethod">
                                    <option value="CASH">Efectivo</option>
                                    <option value="CARD">Tarjeta</option>
                                    <option value="TRANSFER">Transferencia</option>
                                </select>
                            </div>


                            
                            <div class="mb-3">
                                <label class="form-label">Descuento</label>
                                <input type="number" class="form-control" [(ngModel)]="discount" />
                            </div>

                        
                            <div class="bg-light p-3 rounded-3 mb-3">
                                <div class="d-flex justify-content-between">
                                    <span>Subtotal</span>
                                    <span>{{ getSubtotal() | currency }}</span>
                                </div>

                                <div class="d-flex justify-content-between">
                                    <span>Descuento</span>
                                    <span>- {{ discount | currency }}</span>
                                </div>

                                <hr />

                                <div class="d-flex justify-content-between fw-bold fs-5">
                                    <span>Total</span>
                                    <span class="text-success">
                                        {{ getTotal() | currency }}
                                    </span>
                                </div>
                            </div>


                            
                            <button class="btn btn-success w-100 py-2 fw-bold shadow-sm" (click)="createSale()"
                                [disabled]="cart.length === 0">
                                Finalizar Venta
                            </button>

                        </div>
                    </div>
                </div>

            </div>
        </div>


    </div>
</div>
